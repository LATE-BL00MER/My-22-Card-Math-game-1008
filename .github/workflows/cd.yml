name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  # Job 1: Docker 이미지 빌드 및 GHCR 푸시
  docker-build-push:
    name: Docker Build and Push to GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인 (GitHub Container Registry)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Frontend 이미지 빌드 (아이디 소문자 고정)
      - name: Frontend Docker 이미지 빌드 및 GHCR 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/late-bl00mer/card-match-game/frontend:sha-${{ github.sha }}
            ghcr.io/late-bl00mer/card-match-game/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Backend 이미지 빌드 (아이디 소문자 고정)
      - name: Backend Docker 이미지 빌드 및 GHCR 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/late-bl00mer/card-match-game/backend:sha-${{ github.sha }}
            ghcr.io/late-bl00mer/card-match-game/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Docker 빌드 및 푸시 결과 요약 출력
        if: always()
        run: |
          echo "## Docker 이미지 빌드 및 GHCR 푸시 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 이미지 | 태그 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | sha-${{ github.sha }}, latest | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | sha-${{ github.sha }}, latest | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Registry: ghcr.io/late-bl00mer/card-match-game" >> $GITHUB_STEP_SUMMARY

  # Job 2: 컨테이너 이미지 보안 스캔
  container-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    permissions:
      contents: read
      packages: read
    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend 컨테이너 이미지 보안 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/late-bl00mer/card-match-game/frontend:sha-${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Backend 컨테이너 이미지 보안 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/late-bl00mer/card-match-game/backend:sha-${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: 컨테이너 스캔 결과 요약 출력
        if: always()
        run: |
          echo "## 컨테이너 보안 스캔 결과 (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "| 이미지 | 기준 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (sha-${{ github.sha }}) | CRITICAL | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (sha-${{ github.sha }}) | CRITICAL | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  # Job 3: E2E 테스트
  e2e:
    name: E2E Tests (Playwright — Self-Contained)
    runs-on: ubuntu-latest
    needs: [container-scan]
    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 — Backend
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Backend 의존성 설치
        run: npm ci
        working-directory: backend

      - name: Node.js 설정 — Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend 의존성 설치
        run: npm ci
        working-directory: frontend

      - name: Node.js 설정 — E2E
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      - name: E2E 의존성 설치
        run: npm ci
        working-directory: e2e

      - name: Playwright Chromium 브라우저 설치
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: E2E 테스트 실행
        run: npx playwright test
        working-directory: e2e
        env:
          CI: true

      - name: 실패 시 Playwright 리포트 Artifact 업로드
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.sha }}
          path: e2e/playwright-report/
          retention-days: 7

      - name: E2E 테스트 결과 요약 출력
        if: always()
        run: |
          echo "## E2E 테스트 결과 (Self-Contained)" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 테스트 환경 | Actions 러너 내 로컬 서버 |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | http://localhost:3001 |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | http://localhost:4173 |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 SHA | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 테스트 상태 | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  # Job 4: GitHub Pages 정적 배포
  pages-deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [e2e]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4
      - name: Node.js 설정 — Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend 의존성 설치
        run: npm ci
        working-directory: frontend
      - name: GitHub Pages 설정 및 base_path 획득
        uses: actions/configure-pages@v5
        id: pages
      - name: Frontend 프로덕션 빌드
        run: npx tsc -b && npx vite build --base="${{ steps.pages.outputs.base_path }}"
        working-directory: frontend
      - name: GitHub Pages Artifact 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - name: GitHub Pages 배포
        uses: actions/deploy-pages@v4
        id: deployment
      - name: GitHub Pages 배포 결과 요약 출력
        if: always()
        run: |
          echo "## GitHub Pages 배포 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 배포 URL | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 SHA | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 배포 상태 | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  # Job 5: GitHub Pages Smoke Test
  smoke-test:
    name: Smoke Test (GitHub Pages 생존 확인)
    runs-on: ubuntu-latest
    needs: [pages-deploy]
    steps:
      - name: GitHub Pages 사이트 생존 여부 확인
        run: |
          PAGE_URL="${{ needs.pages-deploy.outputs.page_url }}"
          echo "Smoke Test 대상 URL: $PAGE_URL"
          curl -sSf \
            --retry 5 \
            --retry-delay 10 \
            --retry-connrefused \
            --max-time 30 \
            "$PAGE_URL"
          echo "Smoke Test 통과: $PAGE_URL 에서 HTTP 200 응답 수신"
      - name: Smoke Test 결과 요약 출력
        if: always()
        run: |
          echo "## Smoke Test 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 검증 URL | ${{ needs.pages-deploy.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 재시도 횟수 | 최대 5회 (10초 간격) |" >> $GITHUB_STEP_SUMMARY
          echo "| 최종 상태 | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
